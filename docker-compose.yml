services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: tesones-app
    container_name: tesones_app
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped
    working_dir: /var/www
    environment:
      TZ: America/Tijuana
    volumes:
      - .:/var/www
    ports:
      - "5200:5173"
      - "8000:8000"
    depends_on:
      - db
    networks:
      - tesones-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    image: nginx:alpine
    container_name: tesones_web
    restart: unless-stopped
    ports:
      - "9080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - tesones-net

  db:
    image: mariadb:10.11
    container_name: tesones_db
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tesones_db
      MYSQL_USER: rishar
      MYSQL_PASSWORD: secretpassword
    ports:
      - "3309:3306"
    volumes:
      - tesones_dbdata:/var/lib/mysql
    networks:
      - tesones-net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: tesones_pma
    restart: unless-stopped
    ports:
      - "9081:80"
    environment:
      PMA_HOST: db
      PMA_ARBITRARY: 1
    depends_on:
      - db
    networks:
      - tesones-net

  queue:
    image: tesones-app
    container_name: tesones_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - tesones-net

networks:
  tesones-net:
    driver: bridge

volumes:
  tesones_dbdata:
